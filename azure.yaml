# azd (Azure Developer CLI) configuration for FDAI.
#
# Provides the turnkey `azd up` path over the existing Terraform under
# `infra/` (docs/roadmap/deployment/deploy-and-onboard.md). azd drives Terraform as its
# infrastructure provider; the CSP-neutral seams stay defined in HCL.
#
# Scope: this file wires `azd provision` (Terraform apply of the minimum-set
# inventory). Application image build/deploy via an `azd-service-name`-tagged
# Container App is a follow-up (see the commented `services` block below) so a
# half-wired service cannot break `azd provision`.
#
# Environment values (subscription id, tenant id, resource group, region) are
# supplied at run time by the azd environment / env vars, never committed -
# the repo stays customer-agnostic
# (.github/instructions/generic-scope.instructions.md).

name: fdai
metadata:
  template: fdai@0.1.0

infra:
  provider: terraform
  path: infra

# services:
#   # Enable once the Container App resource in infra/ carries the azd tag
#   # `azd-service-name: core` so azd can target it for image deploy.
#   core:
