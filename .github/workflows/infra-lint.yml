name: infra-lint

# Fast, credential-free static checks on the terraform under infra/. Runs on
# GitHub-hosted runners (no Azure access needed) for every PR that touches
# infra, so misformatted / invalid / insecure IaC is caught before it reaches
# the self-hosted deploy runner. Complements deploy-dev.yml (which needs the
# VNet runner for a real plan/apply).

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [infra, infra/bootstrap]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install scanners via their stable CLIs rather than pinned marketplace
      # action tags (which drift and break). Both are advisory (continue-on-error
      # + soft flags) so a finding annotates the PR without blocking.
      - name: Install scanners
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          pipx install checkov

      - name: Trivy (terraform misconfig)
        continue-on-error: true
        run: trivy config --severity HIGH,CRITICAL infra

      - name: Checkov
        continue-on-error: true
        run: checkov -d infra --quiet --compact --framework terraform

