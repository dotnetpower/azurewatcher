id: fdai-system-overview
version: 1
kind: container
updated: 2026-07-20
locales:
  en:
    title: FDAI system architecture
    description: Signals enter a governed control plane and leave through approval-aware delivery paths.
    alt: Azure changes, telemetry, operator requests, and scheduled probes enter Event Hubs. The FDAI control plane ingests each event, selects a trust tier, verifies the decision, applies the risk gate, and either executes, requests approval, or holds. Outcomes are delivered through remediation pull requests and recorded in PostgreSQL for the read-only console.
  ko:
    title: FDAI system architecture
    description: Signal은 governed control plane에 들어오고 approval-aware delivery path를 통해 나갑니다.
    alt: Azure change, telemetry, operator request, scheduled probe가 Event Hubs로 들어갑니다. FDAI control plane은 각 event를 ingest하고 trust tier를 선택하며 decision을 verify하고 risk gate를 적용합니다. 그 결과는 execute, approval request 또는 hold로 이어집니다. Outcome은 remediation pull request로 전달되고 read-only console을 위해 PostgreSQL에 기록됩니다.
canvas:
  width: 1500
  height: 900
  direction: RIGHT
  padding: 36
groups:
  - id: operational-signals
    kind: layer
    label: { en: Operational signals, ko: Operational signal }
    direction: DOWN
  - id: fdai-control-plane
    kind: system
    label: { en: Headless FDAI control plane, ko: Headless FDAI control plane }
    direction: RIGHT
  - id: decision-path
    parent: fdai-control-plane
    kind: layer
    label: { en: Governed decision path, ko: Governed decision path }
    direction: RIGHT
  - id: delivery-surfaces
    kind: layer
    label: { en: Human and delivery surfaces, ko: Human 및 delivery surface }
    direction: DOWN
nodes:
  - id: azure-changes
    parent: operational-signals
    kind: azure-service
    icon: resource-graph
    label: { en: Azure resource changes, ko: Azure resource change }
    description: { en: Resource discovery and change notifications, ko: Resource discovery 및 change notification }
  - id: telemetry
    parent: operational-signals
    kind: azure-service
    icon: monitor
    label: { en: "Metrics, logs, and traces", ko: "Metric, log, trace" }
    description: { en: Azure Monitor operational evidence, ko: Azure Monitor operational evidence }
  - id: operator-request
    parent: operational-signals
    kind: person
    label: { en: Operator request, ko: Operator request }
  - id: scheduled-probe
    parent: operational-signals
    kind: process
    label: { en: Scheduled probe, ko: Scheduled probe }
  - id: event-hubs
    kind: azure-service
    icon: event-hubs
    label: { en: Event Hubs, ko: Event Hubs }
    description: { en: Kafka-compatible event transport, ko: Kafka-compatible event transport }
  - id: event-ingest
    parent: decision-path
    kind: process
    label: { en: Event ingest, ko: Event ingest }
    description: { en: "Validate, normalize, deduplicate, and correlate", ko: "Validate, normalize, deduplicate, correlate" }
  - id: trust-router
    parent: decision-path
    kind: decision
    label: { en: Trust router, ko: Trust router }
    description: { en: "Select the lowest competent T0, T1, or T2 tier", ko: "Decision 가능한 가장 낮은 T0, T1, T2 tier 선택" }
  - id: decision-engine
    parent: decision-path
    kind: process
    label: { en: T0 / T1 / T2 decision, ko: T0 / T1 / T2 decision }
    description: { en: "Deterministic rules, evidence reuse, or grounded reasoning", ko: "Deterministic rule, evidence reuse 또는 grounded reasoning" }
  - id: risk-gate
    parent: decision-path
    kind: decision
    label: { en: Verification and risk gate, ko: Verification 및 risk gate }
    description: { en: Verify evidence and apply the autonomy ceiling, ko: Evidence를 verify하고 autonomy ceiling 적용 }
  - id: executor
    parent: decision-path
    kind: process
    label: { en: Privileged executor, ko: Privileged executor }
    description: { en: "Idempotent action with lock, stop condition, and rollback", ko: "Lock, stop condition, rollback을 갖춘 idempotent action" }
  - id: rule-catalog
    parent: fdai-control-plane
    kind: store
    label: { en: Rule and action catalog, ko: Rule 및 action catalog }
  - id: audit-store
    parent: fdai-control-plane
    kind: azure-service
    icon: postgresql
    label: { en: PostgreSQL and pgvector, ko: PostgreSQL 및 pgvector }
    description: { en: "Append-only audit, state, evidence, and context", ko: "Append-only audit, state, evidence, context" }
  - id: chatops
    parent: delivery-surfaces
    kind: service
    label: { en: ChatOps approval, ko: ChatOps approval }
  - id: remediation-pr
    parent: delivery-surfaces
    kind: service
    label: { en: Remediation pull request, ko: Remediation pull request }
  - id: read-only-console
    parent: delivery-surfaces
    kind: service
    label: { en: Read-only console, ko: Read-only console }
edges:
  - id: changes-to-bus
    from: azure-changes
    to: event-hubs
    kind: event
  - id: telemetry-to-bus
    from: telemetry
    to: event-hubs
    kind: event
  - id: operator-to-bus
    from: operator-request
    to: event-hubs
    kind: request
  - id: probe-to-bus
    from: scheduled-probe
    to: event-hubs
    kind: event
  - id: bus-to-ingest
    from: event-hubs
    to: event-ingest
    kind: event
    label: { en: ordered event, ko: Ordered event }
  - id: ingest-to-router
    from: event-ingest
    to: trust-router
    kind: event
  - id: router-to-decision
    from: trust-router
    to: decision-engine
    kind: request
  - id: catalog-to-decision
    from: rule-catalog
    to: decision-engine
    kind: read
    label: { en: rules and policy, ko: Rule 및 policy }
  - id: decision-to-risk
    from: decision-engine
    to: risk-gate
    kind: request
    label: { en: typed proposal, ko: Typed proposal }
  - id: risk-to-executor
    from: risk-gate
    to: executor
    kind: mutation
    label: { en: eligible action, ko: Eligible action }
  - id: risk-to-chatops
    from: risk-gate
    to: chatops
    kind: approval
    label: { en: approval required, ko: Approval required }
  - id: chatops-to-executor
    from: chatops
    to: executor
    kind: approval
    label: { en: typed approval, ko: Typed approval }
  - id: executor-to-pr
    from: executor
    to: remediation-pr
    kind: mutation
  - id: executor-to-audit
    from: executor
    to: audit-store
    kind: audit
  - id: risk-to-audit
    from: risk-gate
    to: audit-store
    kind: audit
  - id: audit-to-console
    from: audit-store
    to: read-only-console
    kind: read
legend:
  - kind: event
    label: { en: Asynchronous event, ko: Asynchronous event }
  - kind: request
    label: { en: Decision request, ko: Decision request }
  - kind: approval
    label: { en: Human approval, ko: Human approval }
  - kind: mutation
    label: { en: Governed change, ko: Governed change }
  - kind: audit
    label: { en: Audit record, ko: Audit record }
