<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FDAI operator console (read-only)." />
    <title>FDAI Console</title>
    <script>
      // Apply the operator's saved theme before the SPA mounts to avoid
      // a light-to-dark flash on load. Default is "light" per the
      // initial mockup - we do NOT follow prefers-color-scheme unless
      // the operator explicitly opts in later.
      (function () {
        try {
          var t = localStorage.getItem("fdai:console:theme");
          document.documentElement.setAttribute(
            "data-theme",
            t === "dark" ? "dark" : "light"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
