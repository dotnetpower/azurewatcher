  # ── Batch G — WAF Cost / Right-Size ───────────────────────────────────
  - id: compute.vm.low-utilization
    source: azure_advisor
    severity: medium
    category: cost
    resource_type: compute.vm
    remediates: remediate.right-size
    provenance_url: https://learn.microsoft.com/azure/advisor/advisor-cost-recommendations
    parameters:
      cpu_p95_threshold: 20
      memory_p95_threshold: 30
    policy_dir: compute
    policy_stem: vm_low_utilization
    policy_package: aiopspilot.compute.vm_low_utilization
    policy_title: Right-size low-utilisation compute.vm
    policy_description: |
      A compute.vm running well below CPU and memory thresholds is a
      candidate for a smaller SKU. Both thresholds MUST hold so a
      spiky workload is not misclassified.
    policy_body: |
      default deny := false

      cpu_t := t if {
        t := input.parameters.cpu_p95_threshold
      } else := 20

      mem_t := t if {
        t := input.parameters.memory_p95_threshold
      } else := 30

      deny if {
        input.resource.type == "compute.vm"
        input.resource.props.cpu_p95_percent < cpu_t
        input.resource.props.memory_p95_percent < mem_t
      }

      deny_reason := "vm_low_utilization" if deny
    template_dir: compute
    template_stem: vm_right_size
    template_summary: |
      Swap the SKU to var.recommended_vm_size supplied by the
      right-sizing catalog.
    template_body: |
      resource "azurerm_linux_virtual_machine" "${resource_id}" {
        size = var.recommended_vm_size
      }

  - id: kubernetes-node-pool.oversized
    source: azure_advisor
    severity: medium
    category: cost
    resource_type: kubernetes-node-pool
    remediates: remediate.right-size
    provenance_url: https://learn.microsoft.com/azure/advisor/advisor-cost-recommendations
    parameters:
      cpu_p95_threshold: 25
      min_headroom_nodes: 2
    policy_dir: kubernetes
    policy_stem: node_pool_oversized
    policy_package: aiopspilot.kubernetes.node_pool_oversized
    policy_title: Right-size oversized kubernetes-node-pool
    policy_description: |
      A kubernetes-node-pool running well below CPU threshold with more
      nodes than the operator floor is a candidate for scale-down. Both
      conditions MUST hold to avoid breaching the floor.
    policy_body: |
      default deny := false

      cpu_t := t if {
        t := input.parameters.cpu_p95_threshold
      } else := 25

      floor := f if {
        f := input.parameters.min_headroom_nodes
      } else := 2

      deny if {
        input.resource.type == "kubernetes-node-pool"
        input.resource.props.cpu_p95_percent < cpu_t
        input.resource.props.node_count > floor
      }

      deny_reason := "node_pool_oversized" if deny
    template_dir: kubernetes
    template_stem: node_pool_right_size
    template_summary: |
      Reduce node_count by one; a repeated fire converges further.
    template_body: |
      resource "azurerm_kubernetes_cluster_node_pool" "${resource_id}" {
        node_count = var.recommended_node_count
      }

