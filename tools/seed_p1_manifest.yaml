  # ── Batch J — WAF Security / Advanced ─────────────────────────────────
  - id: kubernetes-cluster.rbac-enabled
    source: aks_baseline
    severity: high
    category: security
    resource_type: kubernetes-cluster
    remediates: remediate.enable-rbac
    provenance_url: https://learn.microsoft.com/azure/architecture/reference-architectures/containers/aks/baseline-aks
    policy_dir: kubernetes
    policy_stem: rbac_enabled
    policy_package: aiopspilot.kubernetes.rbac_enabled
    policy_title: Require Azure RBAC on kubernetes-cluster
    policy_description: |
      A kubernetes-cluster MUST use Azure RBAC integration; kubectl
      permissions MUST NOT rely on the built-in local admin.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "kubernetes-cluster"
        input.resource.props.azure_rbac_enabled != true
      }

      deny_reason := "azure_rbac_disabled" if deny
    template_dir: kubernetes
    template_stem: enable_azure_rbac
    template_summary: |
      Turn on AAD-integrated Azure RBAC and disable local accounts.
    template_body: |
      resource "azurerm_kubernetes_cluster" "${resource_id}" {
        local_account_disabled = true

        azure_active_directory_role_based_access_control {
          azure_rbac_enabled = true
        }
      }

  - id: kubernetes-cluster.network-policy
    source: aks_baseline
    severity: high
    category: security
    resource_type: kubernetes-cluster
    remediates: remediate.restrict-network-access
    provenance_url: https://learn.microsoft.com/azure/architecture/reference-architectures/containers/aks/baseline-aks
    policy_dir: kubernetes
    policy_stem: network_policy_required
    policy_package: aiopspilot.kubernetes.network_policy_required
    policy_title: Require a network policy engine on kubernetes-cluster
    policy_description: |
      A kubernetes-cluster MUST run a network-policy engine (calico or
      azure) so pod-to-pod traffic can be restricted.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "kubernetes-cluster"
        not input.resource.props.network_policy
      }

      deny_reason := "no_network_policy" if deny
    template_dir: kubernetes
    template_stem: enable_network_policy
    template_summary: |
      Set network_policy to `azure`.
    template_body: |
      resource "azurerm_kubernetes_cluster" "${resource_id}" {
        network_profile {
          network_plugin = "azure"
          network_policy = "azure"
        }
      }

  - id: kubernetes-cluster.private-cluster
    source: aks_baseline
    severity: high
    category: security
    resource_type: kubernetes-cluster
    remediates: remediate.restrict-network-access
    provenance_url: https://learn.microsoft.com/azure/architecture/reference-architectures/containers/aks/baseline-aks
    policy_dir: kubernetes
    policy_stem: private_cluster_required
    policy_package: aiopspilot.kubernetes.private_cluster_required
    policy_title: Require private API server on kubernetes-cluster
    policy_description: |
      A kubernetes-cluster serving workloads MUST have the API server
      reachable only through a private endpoint.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "kubernetes-cluster"
        input.resource.props.private_cluster_enabled != true
      }

      deny_reason := "api_server_public" if deny
    template_dir: kubernetes
    template_stem: enable_private_cluster
    template_summary: |
      Flip private_cluster_enabled to true; enabling this is forward-
      only in the provider — a paired disable is HIL-gated.
    template_body: |
      resource "azurerm_kubernetes_cluster" "${resource_id}" {
        private_cluster_enabled = true
      }

  - id: postgresql-server.encryption-at-rest
    source: mcsb
    severity: high
    category: security
    resource_type: postgresql-server
    remediates: remediate.enable-encryption
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-data-protection
    policy_dir: postgresql
    policy_stem: encryption_at_rest
    policy_package: aiopspilot.postgresql.encryption_at_rest
    policy_title: Require encryption at rest on postgresql-server
    policy_description: |
      A postgresql-server MUST have encryption at rest enabled; the
      default provider setting is usually service-managed and enough,
      but a rule fires when the property comes back false.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "postgresql-server"
        input.resource.props.encryption_at_rest_enabled != true
      }

      deny_reason := "encryption_at_rest_disabled" if deny
    template_dir: postgresql
    template_stem: enable_encryption_at_rest
    template_summary: |
      Confirm encryption at rest is on via a customer-managed key.
    template_body: |
      resource "azurerm_postgresql_flexible_server" "${resource_id}" {
        customer_managed_key {
          key_vault_key_id = var.pg_cmk_id
        }
      }

  - id: secret-store.public-network-access.disabled
    source: mcsb
    severity: high
    category: security
    resource_type: secret-store
    remediates: remediate.restrict-network-access
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-network-security
    policy_dir: secret_store
    policy_stem: public_network_access_disabled
    policy_package: aiopspilot.secret_store.public_network_access_disabled
    policy_title: Disallow public network access on secret-store
    policy_description: |
      A secret-store MUST NOT accept traffic from the public internet;
      the vault should be reachable only through private-endpoints or
      the platform trusted-services bypass.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "secret-store"
        input.resource.props.public_network_access_enabled == true
      }

      deny_reason := "public_network_access_enabled" if deny
    template_dir: secret_store
    template_stem: disable_public_network_access
    template_summary: |
      Turn public network access off; a paired private-endpoint is
      expected in the platform IaC.
    template_body: |
      resource "azurerm_key_vault" "${resource_id}" {
        public_network_access_enabled = false

        network_acls {
          default_action = "Deny"
          bypass         = "AzureServices"
        }
      }
