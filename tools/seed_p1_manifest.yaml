        }
      }

  - id: secret-store.diagnostic-settings-required
    source: mcsb
    severity: high
    category: security
    resource_type: secret-store
    remediates: remediate.enable-diagnostic-settings
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-logging-threat-detection
    policy_dir: secret_store
    policy_stem: diagnostic_settings_required
    policy_package: aiopspilot.secret_store.diagnostic_settings_required
    policy_title: Require diagnostic-settings on secret-store
    policy_description: |
      A secret-store MUST route AuditEvent logs to a log-workspace so
      every secret read/write is auditable.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "secret-store"
        count(input.resource.props.diagnostic_settings) == 0
      }

      deny_reason := "no_diagnostic_settings" if deny
    template_dir: secret_store
    template_stem: attach_diagnostic_settings
    template_summary: |
      Route AuditEvent to var.log_workspace_id.
    template_body: |
      resource "azurerm_monitor_diagnostic_setting" "${resource_id}_diag" {
        name                       = "keyvault-diag"
        target_resource_id         = azurerm_key_vault.${resource_id}.id
        log_analytics_workspace_id = var.log_workspace_id

        enabled_log {
          category = "AuditEvent"
        }
      }

  # ── Batch I — CIS Config Drift / Tagging ──────────────────────────────
  - id: resource-group.owner-tag.required
    source: cis
    severity: low
    category: config_drift
    resource_type: resource-group
    remediates: remediate.tag-add
    parameters:
      tag_name: owner
      tag_value: unassigned
    provenance_url: https://www.cisecurity.org/benchmark/azure
    policy_dir: resource_group
    policy_stem: owner_tag_required
    policy_package: aiopspilot.resource_group.owner_tag_required
    policy_title: Owner tag required on resource-group
    policy_description: |
      Every resource-group MUST carry an `owner` tag so ownership is
      auditable.
    policy_body: |
      default deny := false

      required_tag := t if {
        t := input.parameters.tag_name
      } else := "owner"

      deny if {
        input.resource.type == "resource-group"
        not input.resource.props.tags[required_tag]
      }

      deny_reason := sprintf("missing_required_tag:%s", [required_tag]) if deny
    template_dir: resource_group
    template_stem: tag_owner
    template_summary: |
      Merge the required tag; do not replace the tag set.
    template_body: |
      resource "azurerm_resource_group" "${resource_id}" {
        tags = merge(
          var.tags,
          {
            "${tag_name}" = "${tag_value}"
          }
        )
      }

