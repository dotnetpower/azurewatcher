# Seed manifest for P1 rule catalog (50 rules).
#
# Consumed by `tools/seed_p1_rules.py` to emit:
#   - rule-catalog/catalog/<id>.yaml
#   - policies/<policy_dir>/<policy_stem>.rego
#   - rule-catalog/remediation/<template_dir>/<template_stem>.tftpl
#
# This file is authored (not generated). It stays in the tree as a
# machine-readable reference of what a rule "batch" looks like — see
# rule-catalog/RULE_AUTHORING_GUIDE.md for the manual per-rule flow that
# every follow-up rule (including LLM-authored ones) MUST use instead.
#
# All content English, secret-free, customer-agnostic. Provenance URLs
# point to public normative sources (Microsoft Learn, CIS). Every rule
# references an ActionType from rule-catalog/action-types/ and a
# resource_type from rule-catalog/vocabulary/resource-types.yaml.

rules:

  # ── Batch A — MCSB Identity & Access ──────────────────────────────────
  - id: secret-store.rbac-authorization.enabled
    source: mcsb
    severity: high
    category: security
    resource_type: secret-store
    remediates: remediate.enable-rbac
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-privileged-access
    policy_dir: secret_store
    policy_stem: rbac_authorization_enabled
    policy_package: aiopspilot.secret_store.rbac_authorization_enabled
    policy_title: Require RBAC authorization on secret-store
    policy_description: |
      A secret-store MUST use RBAC authorization; legacy access-policies
      leave stale key-based grants un-audited. The T0 rule denies when the
      inventory reports RBAC as disabled.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "secret-store"
        input.resource.props.rbac_authorization_enabled != true
      }

      deny_reason := "rbac_authorization_disabled" if deny
    template_dir: secret_store
    template_stem: enable_rbac_authorization
    template_summary: |
      Flip the vault to RBAC mode and keep other settings intact.
    template_body: |
      resource "azurerm_key_vault" "${resource_id}" {
        enable_rbac_authorization = true
      }

  - id: secret-store.soft-delete.enabled
    source: mcsb
    severity: high
    category: security
    resource_type: secret-store
    remediates: remediate.enable-backup-protection
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-backup-and-recovery
    policy_dir: secret_store
    policy_stem: soft_delete_enabled
    policy_package: aiopspilot.secret_store.soft_delete_enabled
    policy_title: Require soft-delete on secret-store
    policy_description: |
      A secret-store MUST have soft-delete enabled so a purge is
      recoverable within the provider retention window.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "secret-store"
        input.resource.props.soft_delete_enabled != true
      }

      deny_reason := "soft_delete_disabled" if deny
    template_dir: secret_store
    template_stem: enable_soft_delete
    template_summary: |
      Turn on soft-delete with the provider default retention.
    template_body: |
      resource "azurerm_key_vault" "${resource_id}" {
        soft_delete_retention_days = 90
      }

  - id: secret-store.purge-protection.enabled
    source: mcsb
    severity: high
    category: security
    resource_type: secret-store
    remediates: remediate.enable-purge-protection
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-backup-and-recovery
    policy_dir: secret_store
    policy_stem: purge_protection_enabled
    policy_package: aiopspilot.secret_store.purge_protection_enabled
    policy_title: Require purge protection on secret-store
    policy_description: |
      A secret-store MUST have purge protection enabled so a soft-deleted
      secret cannot be purged during the retention window. Turning it on
      is irreversible — the ActionType is HIL-gated until measured.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "secret-store"
        input.resource.props.purge_protection_enabled != true
      }

      deny_reason := "purge_protection_disabled" if deny
    template_dir: secret_store
    template_stem: enable_purge_protection
    template_summary: |
      Turn on purge protection. Once enabled the provider does not allow
      turning it off.
    template_body: |
      resource "azurerm_key_vault" "${resource_id}" {
        purge_protection_enabled = true
      }

  - id: compute.vm.managed-identity.assigned
    source: mcsb
    severity: medium
    category: security
    resource_type: compute.vm
    remediates: remediate.assign-identity
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-identity-management
    policy_dir: compute
    policy_stem: vm_managed_identity_assigned
    policy_package: aiopspilot.compute.vm_managed_identity_assigned
    policy_title: Require a managed-identity on compute.vm
    policy_description: |
      A compute.vm MUST have a system- or user-assigned managed-identity
      so it does not depend on secrets embedded in application settings.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "compute.vm"
        input.resource.props.identity_type == "None"
      }

      deny_reason := "no_managed_identity" if deny
    template_dir: compute
    template_stem: vm_assign_system_identity
    template_summary: |
      Attach a system-assigned managed identity. Existing user-assigned
      identities (if any) stay attached; this only turns SystemAssigned on.
    template_body: |
      resource "azurerm_linux_virtual_machine" "${resource_id}" {
        identity {
          type = "SystemAssigned"
        }
      }

  - id: object-storage.shared-key-access.disabled
    source: mcsb
    severity: high
    category: security
    resource_type: object-storage
    remediates: remediate.enable-rbac
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-identity-management
    policy_dir: object_storage
    policy_stem: shared_key_access_disabled
    policy_package: aiopspilot.object_storage.shared_key_access_disabled
    policy_title: Disallow shared-key access on object-storage
    policy_description: |
      An object-storage account MUST NOT accept shared-key auth; every
      caller SHOULD use AAD RBAC via a managed-identity.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "object-storage"
        input.resource.props.allow_shared_key_access == true
      }

      deny_reason := "shared_key_access_enabled" if deny
    template_dir: object_storage
    template_stem: disable_shared_key_access
    template_summary: |
      Turn off shared-key auth so every caller uses AAD RBAC.
    template_body: |
      resource "azurerm_storage_account" "${resource_id}" {
        shared_access_key_enabled = false
      }

  # ── Batch B — MCSB Data Protection ────────────────────────────────────
  - id: object-storage.encryption-at-rest.required
    source: mcsb
    severity: high
    category: security
    resource_type: object-storage
    remediates: remediate.enable-encryption
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-data-protection
    policy_dir: object_storage
    policy_stem: encryption_at_rest_required
    policy_package: aiopspilot.object_storage.encryption_at_rest_required
    policy_title: Require infrastructure encryption on object-storage
    policy_description: |
      An object-storage account MUST have infrastructure encryption
      (double encryption at rest) enabled. The default single-layer
      service-managed encryption is not enough for regulated data.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "object-storage"
        input.resource.props.infrastructure_encryption_enabled != true
      }

      deny_reason := "infrastructure_encryption_disabled" if deny
    template_dir: object_storage
    template_stem: enable_infrastructure_encryption
    template_summary: |
      Enable the double-encryption layer.
    template_body: |
      resource "azurerm_storage_account" "${resource_id}" {
        infrastructure_encryption_enabled = true
      }

  - id: object-storage.https-only.required
    source: mcsb
    severity: high
    category: security
    resource_type: object-storage
    remediates: remediate.set-tls-policy
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-data-protection
    policy_dir: object_storage
    policy_stem: https_only_required
    policy_package: aiopspilot.object_storage.https_only_required
    policy_title: Require HTTPS-only traffic on object-storage
    policy_description: |
      An object-storage account MUST reject HTTP; plaintext traffic to
      the account is a data-in-transit exposure.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "object-storage"
        input.resource.props.enable_https_traffic_only != true
      }

      deny_reason := "https_only_disabled" if deny
    template_dir: object_storage
    template_stem: enforce_https_only
    template_summary: |
      Turn on the HTTPS-only flag.
    template_body: |
      resource "azurerm_storage_account" "${resource_id}" {
        enable_https_traffic_only = true
      }

  - id: object-storage.min-tls-version
    source: mcsb
    severity: medium
    category: security
    resource_type: object-storage
    remediates: remediate.set-tls-policy
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-data-protection
    parameters:
      min_tls_version: "TLS1_2"
    policy_dir: object_storage
    policy_stem: min_tls_version
    policy_package: aiopspilot.object_storage.min_tls_version
    policy_title: Require min TLS 1.2 on object-storage
    policy_description: |
      An object-storage account MUST require TLS 1.2 or higher; older
      TLS versions are considered broken.
    policy_body: |
      default deny := false

      required_tls := t if {
        t := input.parameters.min_tls_version
      } else := "TLS1_2"

      deny if {
        input.resource.type == "object-storage"
        input.resource.props.min_tls_version != required_tls
        input.resource.props.min_tls_version != "TLS1_3"
      }

      deny_reason := sprintf("min_tls_below:%s", [required_tls]) if deny
    template_dir: object_storage
    template_stem: set_min_tls_version
    template_summary: |
      Raise the min TLS floor.
    template_body: |
      resource "azurerm_storage_account" "${resource_id}" {
        min_tls_version = "${min_tls_version}"
      }

  - id: sql-database.audit-enabled
    source: mcsb
    severity: high
    category: security
    resource_type: sql-database
    remediates: remediate.enable-diagnostic-settings
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-logging-threat-detection
    policy_dir: sql_database
    policy_stem: audit_enabled
    policy_package: aiopspilot.sql_database.audit_enabled
    policy_title: Require auditing on sql-database
    policy_description: |
      A sql-database MUST have auditing enabled routing to a log-workspace
      so admin actions are recoverable for forensics.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "sql-database"
        input.resource.props.audit_enabled != true
      }

      deny_reason := "audit_disabled" if deny
    template_dir: sql_database
    template_stem: enable_audit
    template_summary: |
      Attach a diagnostic-settings resource routing audit logs to a
      log-workspace referenced by var.log_workspace_id.
    template_body: |
      resource "azurerm_monitor_diagnostic_setting" "${resource_id}_audit" {
        name                       = "sql-audit"
        target_resource_id         = azurerm_mssql_database.${resource_id}.id
        log_analytics_workspace_id = var.log_workspace_id

        enabled_log {
          category = "SQLSecurityAuditEvents"
        }
      }

  - id: postgresql-server.ssl-enforcement
    source: mcsb
    severity: high
    category: security
    resource_type: postgresql-server
    remediates: remediate.enable-encryption
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-data-protection
    policy_dir: postgresql
    policy_stem: ssl_enforcement
    policy_package: aiopspilot.postgresql.ssl_enforcement
    policy_title: Require SSL enforcement on postgresql-server
    policy_description: |
      A postgresql-server MUST enforce SSL; unencrypted client traffic
      to the database is a data-in-transit exposure.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "postgresql-server"
        input.resource.props.ssl_enforcement != "enabled"
      }

      deny_reason := "ssl_enforcement_disabled" if deny
    template_dir: postgresql
    template_stem: enforce_ssl
    template_summary: |
      Turn on SSL enforcement.
    template_body: |
      resource "azurerm_postgresql_flexible_server" "${resource_id}" {
        # Flexible server enforces SSL via a server parameter.
      }

      resource "azurerm_postgresql_flexible_server_configuration" "${resource_id}_ssl" {
        name      = "require_secure_transport"
        server_id = azurerm_postgresql_flexible_server.${resource_id}.id
        value     = "ON"
      }

  # ── Batch C — MCSB Network ────────────────────────────────────────────
  - id: network.nsg.no-inbound-any-ssh
    source: mcsb
    severity: high
    category: security
    resource_type: network.nsg
    remediates: remediate.restrict-network-access
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-network-security
    policy_dir: network
    policy_stem: nsg_no_inbound_any_ssh
    policy_package: aiopspilot.network.nsg_no_inbound_any_ssh
    policy_title: Disallow any-source inbound SSH on network.nsg
    policy_description: |
      A network.nsg MUST NOT allow inbound TCP/22 from any source. Public
      SSH exposure is a credential-brute-force surface.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "network.nsg"
        some rule in input.resource.props.security_rules
        rule.direction == "Inbound"
        rule.access == "Allow"
        rule.protocol == "Tcp"
        rule.destination_port_range == "22"
        rule.source_address_prefix == "*"
      }

      deny_reason := "inbound_ssh_any" if deny
    template_dir: network
    template_stem: nsg_scope_ssh_to_management
    template_summary: |
      Replace the wide-open SSH rule with a management-CIDR allow list
      supplied by var.management_source_cidrs.
    template_body: |
      resource "azurerm_network_security_rule" "${resource_id}_allow_ssh_scoped" {
        name                       = "AllowSSHFromManagement"
        priority                   = 1000
        direction                  = "Inbound"
        access                     = "Allow"
        protocol                   = "Tcp"
        destination_port_range     = "22"
        source_address_prefixes    = var.management_source_cidrs
        source_port_range          = "*"
        destination_address_prefix = "*"
      }

  - id: network.nsg.no-inbound-any-rdp
    source: mcsb
    severity: high
    category: security
    resource_type: network.nsg
    remediates: remediate.restrict-network-access
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-network-security
    policy_dir: network
    policy_stem: nsg_no_inbound_any_rdp
    policy_package: aiopspilot.network.nsg_no_inbound_any_rdp
    policy_title: Disallow any-source inbound RDP on network.nsg
    policy_description: |
      A network.nsg MUST NOT allow inbound TCP/3389 from any source.
      Public RDP exposure is a credential-brute-force surface.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "network.nsg"
        some rule in input.resource.props.security_rules
        rule.direction == "Inbound"
        rule.access == "Allow"
        rule.protocol == "Tcp"
        rule.destination_port_range == "3389"
        rule.source_address_prefix == "*"
      }

      deny_reason := "inbound_rdp_any" if deny
    template_dir: network
    template_stem: nsg_scope_rdp_to_management
    template_summary: |
      Replace the wide-open RDP rule with a management-CIDR allow list.
    template_body: |
      resource "azurerm_network_security_rule" "${resource_id}_allow_rdp_scoped" {
        name                       = "AllowRDPFromManagement"
        priority                   = 1001
        direction                  = "Inbound"
        access                     = "Allow"
        protocol                   = "Tcp"
        destination_port_range     = "3389"
        source_address_prefixes    = var.management_source_cidrs
        source_port_range          = "*"
        destination_address_prefix = "*"
      }

  - id: object-storage.private-endpoint.required
    source: mcsb
    severity: high
    category: security
    resource_type: object-storage
    remediates: remediate.restrict-network-access
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-network-security
    policy_dir: object_storage
    policy_stem: private_endpoint_required
    policy_package: aiopspilot.object_storage.private_endpoint_required
    policy_title: Require a private-endpoint on object-storage
    policy_description: |
      An object-storage account holding data MUST be reachable only
      through a private-endpoint; public network access is denied.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "object-storage"
        input.resource.props.public_network_access_enabled == true
      }

      deny if {
        input.resource.type == "object-storage"
        count(input.resource.props.private_endpoints) == 0
      }

      deny_reason := "no_private_endpoint" if deny
    template_dir: object_storage
    template_stem: attach_private_endpoint
    template_summary: |
      Turn public network access off; a paired private-endpoint resource
      is expected to be provisioned separately by the platform IaC.
    template_body: |
      resource "azurerm_storage_account" "${resource_id}" {
        public_network_access_enabled = false
      }

  - id: network.vnet.ddos-plan.required
    source: mcsb
    severity: medium
    category: security
    resource_type: network.vnet
    remediates: remediate.restrict-network-access
    provenance_url: https://learn.microsoft.com/security/benchmark/azure/mcsb-network-security
    policy_dir: network
    policy_stem: vnet_ddos_plan_required
    policy_package: aiopspilot.network.vnet_ddos_plan_required
    policy_title: Require a DDoS protection plan on network.vnet
    policy_description: |
      A network.vnet holding internet-exposed workloads MUST be attached
      to a DDoS protection plan.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "network.vnet"
        input.resource.props.ddos_protection_plan_id == ""
      }

      deny_reason := "no_ddos_plan" if deny
    template_dir: network
    template_stem: vnet_attach_ddos_plan
    template_summary: |
      Attach the shared DDoS plan supplied by var.ddos_plan_id.
    template_body: |
      resource "azurerm_virtual_network" "${resource_id}" {
        ddos_protection_plan {
          id     = var.ddos_plan_id
          enable = true
        }
      }

  - id: network.public-ip.orphan
    source: azure_advisor
    severity: low
    category: cost
    resource_type: network.public-ip
    remediates: remediate.remove-orphan-resource
    provenance_url: https://learn.microsoft.com/azure/advisor/advisor-cost-recommendations
    policy_dir: network
    policy_stem: public_ip_orphan
    policy_package: aiopspilot.network.public_ip_orphan
    policy_title: Remove orphaned network.public-ip
    policy_description: |
      A network.public-ip that is not associated to any resource is
      billed but delivers no value; safe to remove.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "network.public-ip"
        input.resource.props.associated_resource_id == ""
      }

      deny_reason := "public_ip_unassociated" if deny
    template_dir: network
    template_stem: public_ip_remove_orphan
    template_summary: |
      Remove the orphaned public IP (PR-declared deletion).
    template_body: |
      # The remediation PR removes this resource stanza.
      # No replacement resource is emitted.

  # ── Batch D — WAF Reliability / Backup ────────────────────────────────
  - id: sql-database.geo-redundant-backup
    source: waf
    severity: high
    category: reliability
    resource_type: sql-database
    remediates: remediate.enable-backup-protection
    provenance_url: https://learn.microsoft.com/azure/well-architected/reliability/backup-recovery
    policy_dir: sql_database
    policy_stem: geo_redundant_backup
    policy_package: aiopspilot.sql_database.geo_redundant_backup
    policy_title: Require geo-redundant backup on sql-database
    policy_description: |
      A sql-database that stores customer-facing data MUST use
      geo-redundant backup storage so a regional outage does not lose
      the point-in-time restore window.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "sql-database"
        input.resource.props.geo_redundant_backup_enabled != true
      }

      deny_reason := "geo_redundant_backup_disabled" if deny
    template_dir: sql_database
    template_stem: enable_geo_redundant_backup
    template_summary: |
      Switch backup storage redundancy to geo.
    template_body: |
      resource "azurerm_mssql_database" "${resource_id}" {
        storage_account_type = "Geo"
      }

  - id: postgresql-server.point-in-time-restore
    source: waf
    severity: high
    category: reliability
    resource_type: postgresql-server
    remediates: remediate.enable-backup-protection
    provenance_url: https://learn.microsoft.com/azure/well-architected/reliability/backup-recovery
    parameters:
      min_retention_days: 7
    policy_dir: postgresql
    policy_stem: point_in_time_restore
    policy_package: aiopspilot.postgresql.point_in_time_restore
    policy_title: Require adequate PITR window on postgresql-server
    policy_description: |
      A postgresql-server MUST retain at least the operator-configured
      number of days of backups (default 7) to support point-in-time
      restore after an accidental data change.
    policy_body: |
      default deny := false

      min_days := d if {
        d := input.parameters.min_retention_days
      } else := 7

      deny if {
        input.resource.type == "postgresql-server"
        input.resource.props.backup_retention_days < min_days
      }

      deny_reason := "backup_retention_below_min" if deny
    template_dir: postgresql
    template_stem: raise_backup_retention
    template_summary: |
      Raise the backup retention window.
    template_body: |
      resource "azurerm_postgresql_flexible_server" "${resource_id}" {
        backup_retention_days = ${min_retention_days}
      }

  - id: object-storage.soft-delete-blob
    source: waf
    severity: high
    category: reliability
    resource_type: object-storage
    remediates: remediate.enable-backup-protection
    provenance_url: https://learn.microsoft.com/azure/storage/blobs/soft-delete-blob-overview
    parameters:
      retention_days: 14
    policy_dir: object_storage
    policy_stem: blob_soft_delete
    policy_package: aiopspilot.object_storage.blob_soft_delete
    policy_title: Require blob soft-delete on object-storage
    policy_description: |
      An object-storage account MUST have blob soft-delete enabled so
      an accidental delete is recoverable within the retention window.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "object-storage"
        input.resource.props.blob_soft_delete_enabled != true
      }

      deny_reason := "blob_soft_delete_disabled" if deny
    template_dir: object_storage
    template_stem: enable_blob_soft_delete
    template_summary: |
      Turn on blob soft-delete with the operator-configured retention.
    template_body: |
      resource "azurerm_storage_account" "${resource_id}" {
        blob_properties {
          delete_retention_policy {
            days = ${retention_days}
          }
        }
      }

  - id: object-storage.versioning-enabled
    source: waf
    severity: medium
    category: reliability
    resource_type: object-storage
    remediates: remediate.enable-backup-protection
    provenance_url: https://learn.microsoft.com/azure/storage/blobs/versioning-overview
    policy_dir: object_storage
    policy_stem: blob_versioning
    policy_package: aiopspilot.object_storage.blob_versioning
    policy_title: Require blob versioning on object-storage
    policy_description: |
      An object-storage account MUST have blob versioning enabled so
      each overwrite produces a recoverable prior version.
    policy_body: |
      default deny := false

      deny if {
        input.resource.type == "object-storage"
        input.resource.props.blob_versioning_enabled != true
      }

      deny_reason := "blob_versioning_disabled" if deny
    template_dir: object_storage
    template_stem: enable_blob_versioning
    template_summary: |
      Turn on blob versioning.
    template_body: |
      resource "azurerm_storage_account" "${resource_id}" {
        blob_properties {
          versioning_enabled = true
        }
      }

  - id: disk.snapshot-policy.required
    source: waf
    severity: medium
    category: reliability
    resource_type: disk
    remediates: remediate.enable-backup-protection
