# Operator-console tool contracts (description + input_schema), shared across
# surfaces. This is the model-facing contract only - each surface keeps its own
# `run` implementation (the CLI cockpit in cli/src/narrator/tools.ts; the
# read-API chat backend in Python). Loaded by cli/src/narrator/tool-store.ts.
#
# These are the read-only operator-console tools. They are deliberately NOT under
# rule-catalog/prompts/tools/ (which is the T2 quality-gate tool manifest, tier-
# gated and injected into every T2 request); keeping them here isolates them from
# T2 composition. Surface-specific tools (e.g. the CLI cockpit's set_view display
# control) stay in the surface code, not this shared manifest.
#
# provenance.source: cli/src/narrator/tools.ts
version: 1
tools:
  - id: get_kpi
    description: >-
      Current KPI snapshot: total events, shadow/enforce split, how many are
      awaiting a human decision, trust-tier shares, and the last recorded time.
    input_schema:
      type: object
      properties: {}
      additionalProperties: false

  - id: get_hil_queue
    description: >-
      The human-in-the-loop (HIL) queue: items the risk gate escalated to a
      human for approval. Approval is PR-native and read-only from here.
    input_schema:
      type: object
      properties: {}
      additionalProperties: false

  - id: get_recent_audit
    description: >-
      The most recent audit-log entries (append-only). Each entry has a sequence
      number, action kind, mode (shadow/enforce), and actor.
    input_schema:
      type: object
      properties:
        limit: { type: integer, minimum: 1, maximum: 20 }
      additionalProperties: false

  - id: get_live_overview
    description: >-
      Live snapshot from the cockpit: events handled, trust-tier mix
      (T0/T1/T2/stepped-back), outcomes (auto-applied, awaiting you, undone,
      errors), and the resource-TYPE breakdown seen on the live stream (e.g.
      compute.vm, network.nsg). Use for questions about what the pipeline HAS
      PROCESSED. Note: these are live event types, not a named resource-group
      inventory.
    input_schema:
      type: object
      properties: {}
      additionalProperties: false

  - id: query_inventory
    description: >-
      Query LIVE Azure inventory via Azure Resource Graph (READ-ONLY; cannot
      modify anything). Provide a Kusto/KQL 'kql' query. Use for real resource
      lists and state - resource groups, running or stopped VMs, storage accounts
      - AND for troubleshooting. Useful tables/patterns: (1) 'Resources' for
      current state, e.g. container-app deployment: "Resources | where type =~
      'microsoft.app/containerapps' | project name,
      provisioningState=tostring(properties.provisioningState),
      latestRevision=tostring(properties.latestRevisionName), resourceGroup" (a
      stuck deploy shows provisioningState != 'Succeeded' or an old
      latestRevisionName); (2) 'resourcechanges' for what changed recently, e.g.
      "resourcechanges | extend t=todatetime(properties.changeAttributes.timestamp),
      ct=tostring(properties.changeType), id=tostring(properties.targetResourceId)
      | project t, ct, id | order by t desc | limit 10"; (3) 'healthresources'
      for Azure Resource Health, e.g. "healthresources | extend
      state=tostring(properties.availabilityState) | where state != 'Available' |
      project name=tostring(properties.targetResourceType), state"; (4) VM power
      state via properties.extended.instanceView.powerState.code. Most resource
      config is under 'properties' and is queryable, e.g. AKS version: "Resources
      | where type =~ 'microsoft.containerservice/managedclusters' | project
      name, kubernetesVersion=tostring(properties.kubernetesVersion),
      provisioningState=tostring(properties.provisioningState), resourceGroup";
      public exposure: "Resources | where type =~
      'microsoft.network/publicipaddresses' | project name,
      ip=tostring(properties.ipAddress), resourceGroup". Results are row-capped.
      Only reads; it can never change a resource.
    input_schema:
      type: object
      properties:
        kql: { type: string, description: A read-only Azure Resource Graph Kusto query. }
      required: [kql]
      additionalProperties: false

  - id: get_metrics
    description: >-
      Azure Monitor metrics for a resource (READ-ONLY) - use to diagnose
      performance symptoms (slow, high load, latency). Provide the resource's
      full ARM 'resourceId' (get it from query_inventory by projecting id) and
      comma-separated 'metrics'. Common metric names: SQL database -> cpu_percent,
      dtu_consumption_percent, storage_percent, deadlock; App Service / Container
      App -> Requests, ResponseTime, UsageNanoCores, Replicas, RestartCount; VM ->
      'Percentage CPU', 'Available Memory Bytes', 'Network In Total'; storage ->
      Transactions, SuccessE2ELatency, Availability. Optional 'hours' (default 1).
      Read-only; it never changes a resource.
    input_schema:
      type: object
      properties:
        resourceId: { type: string, description: Full ARM id of the resource (from query_inventory). }
        metrics: { type: string, description: Comma-separated Azure Monitor metric names. }
        hours: { type: number, description: Look-back window in hours (default 1, max 24). }
      required: [resourceId, metrics]
      additionalProperties: false

  - id: get_activity_log
    description: >-
      Azure Activity Log - recent control-plane operations (READ-ONLY). Use for
      'why did the deploy fail', 'what operations failed', 'who did/changed
      something', or 'recent errors'. Optional 'hours' (default 24, max 168) and
      'filter': pass 'failed' to see only failed operations, or a text fragment
      (operation or resource-group name) to narrow. Returns timestamped
      operations with their status. Read-only; it never changes anything.
    input_schema:
      type: object
      properties:
        hours: { type: number, description: Look-back window in hours (default 24, max 168). }
        filter: { type: string, description: "'failed' for failures only, or a text fragment to match." }
      additionalProperties: false

  - id: get_cost
    description: >-
      Azure cost via Cost Management (READ-ONLY). Use for 'this month's cost',
      'most expensive resource group / service', 'where is spend going', or a
      cost spike. Optional 'timeframe' (MonthToDate default, BillingMonthToDate,
      TheLastMonth, WeekToDate) and 'groupBy' (ResourceGroupName default,
      ServiceName, ResourceType, ResourceLocation). Returns the total and the top
      groups by cost. Read-only.
    input_schema:
      type: object
      properties:
        timeframe: { type: string, enum: [MonthToDate, BillingMonthToDate, TheLastMonth, WeekToDate] }
        groupBy: { type: string, enum: [ResourceGroupName, ServiceName, ResourceType, ResourceLocation] }
      additionalProperties: false

  - id: get_quota
    description: >-
      Azure compute quota / capacity headroom (READ-ONLY) - current usage vs
      limit for vCPU families, VMs, and so on. Use for 'is there quota left',
      'capacity', 'vCPU headroom', 'am I near a limit'. Optional 'location' (an
      Azure region); if omitted, the region with the most resources is used.
      Returns the highest-utilization quotas first. Read-only.
    input_schema:
      type: object
      properties:
        location: { type: string, description: Azure region (e.g. koreacentral); optional. }
      additionalProperties: false

  - id: describe_guarantees
    description: >-
      Grounded facts about how the control plane works and what it guarantees:
      trust tiers (T0/T1/T2) and the LLM quality gate, risk-gated autonomy and
      HIL, shadow-vs-enforce, the four safety invariants (stop-condition,
      rollback, blast-radius, audit), PR-native delivery, the rule catalog and
      overrides, the verticals, and which agent judges/approves/executes/rolls
      back. Use for questions like 'can you roll back', 'is it safe', 'how do you
      handle risky changes', 'are you enforcing or shadow', 'what rules do you
      check', 'what can you do', or 'who executes/approves'.
    input_schema:
      type: object
      properties: {}
      additionalProperties: false
