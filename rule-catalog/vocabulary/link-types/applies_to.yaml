# LinkType: applies_to (Rule -> Resource, M:M)
#
# Which resource types a Rule may match. In the current catalog the
# concrete match value is stored on the Rule as its `resource_type`
# field; this LinkType declaration exists so downstream tooling
# (assurance twin, operator console) can enumerate the relationship
# without hard-coding the field name.
schema_version: "1.0.0"
name: applies_to
version: "1.0.0"
from_type: Rule
to_type: Resource
cardinality: many_to_many
description: Which resource subtypes a Rule may match.
