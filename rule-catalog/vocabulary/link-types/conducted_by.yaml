# LinkType: conducted_by (Conversation -> Agent, M:1)
#
# The pantheon Agent that ran a conversation (Bragi for the
# conversational surface today; other agents when their own tools
# extend the surface). Cardinality is M:1 because a Conversation is
# owned by exactly one Agent, but one Agent conducts many
# Conversations across sessions.
schema_version: "1.0.0"
name: conducted_by
version: "1.0.0"
from_type: Conversation
to_type: Agent
cardinality: many_to_one
description: Pantheon Agent that conducted a Conversation.
