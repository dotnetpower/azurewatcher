# LinkType: detects (Rule -> SecurityEvent, M:M)
#
# A Rule that matches on SecurityEvent signals (rather than generic
# Signals or Resource state) declares the match here. M:M because a
# single SecurityEvent stream can drive multiple Rules and a Rule can
# detect multiple event kinds.
schema_version: "1.0.0"
name: detects
version: "1.0.0"
from_type: Rule
to_type: SecurityEvent
cardinality: many_to_many
description: Which SecurityEvent kinds a Rule matches on.
