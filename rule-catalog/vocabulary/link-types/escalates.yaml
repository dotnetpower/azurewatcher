# LinkType: escalates (Agent -> HandoffEscalation, M:M)
#
# When an Agent decides a request exceeds its scope it emits a
# HandoffEscalation that Saga materialises into a GitHub Issue with
# fingerprint deduplication (agent-pantheon.md - Handoff and security
# notification). Modeled as M:M so a HandoffEscalation may carry
# co-signatures from multiple agents (e.g. Forseti judging + Odin
# arbitration).
schema_version: "1.0.0"
name: escalates
version: "1.0.0"
from_type: Agent
to_type: HandoffEscalation
cardinality: many_to_many
description: Agents that produced or co-signed a HandoffEscalation.
