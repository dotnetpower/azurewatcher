# LinkType: precedes (Finding -> Finding, M:M, temporal)
#
# Correlation of related Findings on one incident. Queries over this
# link MUST respect the `evaluation_ts` on each endpoint - the
# temporal_order flag tells the traversal engine to enforce the
# ordering. Symmetric partner is `follows` (not shipped; a fork adds
# it when the query pattern actually needs the reverse direction).
schema_version: "1.0.0"
name: precedes
version: "1.0.0"
from_type: Finding
to_type: Finding
cardinality: many_to_many
temporal_order: true
description: Correlation of related Findings on one incident; endpoints have a strict time ordering.
