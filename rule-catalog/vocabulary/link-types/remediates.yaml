# LinkType: remediates (Rule -> Rule, M:1)
#
# The ontology ActionType a Rule proposes on match. Modeled here as a
# Rule -> Rule link because ActionType instances live in
# `rule-catalog/action-types/` and are cross-referenced by name from
# each Rule; the `Rule` ObjectType represents both authored controls
# and ActionType instances in the runtime graph.
#
# Concrete cross-reference validation lives in
# `fdai.rule_catalog.schema.rule.load_rule_catalog` which resolves
# `remediates` against the ActionType catalog.
schema_version: "1.0.0"
name: remediates
version: "1.0.0"
from_type: Rule
to_type: Rule
cardinality: many_to_one
description: The ontology ActionType a Rule proposes on match.
