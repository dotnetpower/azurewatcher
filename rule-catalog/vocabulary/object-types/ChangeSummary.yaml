# Upstream reference ObjectType: ChangeSummary.
#
# A `ChangeSummary` is a document artifact that projects the resource
# change events observed within a bounded time window over a resource
# scope (typically a resource-group). It is the shipped example of a
# **non-Resource business ObjectType** and is referenced by:
#
# - the reference ActionType `ops.publish-change-summary` under
#   `rule-catalog/action-types/`,
# - the reference Rule `ops.change-summary` under `rule-catalog/catalog/`.
#
# Fork extension: a fork that adds a workflow object (architecture
# proposal, compliance attestation record, incident postmortem) copies
# this file's shape into `fork/vocabulary/object-types/`. See
# `docs/roadmap/downstream-fork-example-vertical.md` for the full
# walkthrough.
#
# The ObjectType declaration is metadata only - it does not by itself
# create runtime instances. Instances are produced by the executor when
# the paired ActionType fires; the audit log persists them.
schema_version: "1.0.0"
name: ChangeSummary
version: "1.0.0"
key: id
description: A document projecting resource change events observed within a bounded time window over a resource scope.
properties:
  id:
    type: string
    required: true
    description: Idempotent report id derived from (scope_ref, window_start, window_end); retries MUST reuse it.
  scope_ref:
    type: string
    required: true
    description: CSP-neutral identifier of the resource whose subtree the summary covers (typically a resource-group ref).
  window_start:
    type: datetime
    required: true
    description: RFC 3339 UTC timestamp; the earliest change event included in the summary.
  window_end:
    type: datetime
    required: true
    description: RFC 3339 UTC timestamp; the latest change event included in the summary (exclusive).
  generated_at:
    type: datetime
    required: true
    description: RFC 3339 UTC timestamp when the executor produced the report.
  resource_count:
    type: integer
    required: true
    description: Number of distinct Resource instances that changed within the window.
  change_count:
    type: integer
    required: true
    description: Total number of change events aggregated into the summary.
  format:
    type: string
    required: true
    description: Rendered output format; the reference template ships "markdown".
  delivery_ref:
    type: string
    required: false
    description: External reference (PR url, page id, ticket id) once the delivery adapter publishes the report.
