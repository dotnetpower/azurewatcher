# Upstream built-in ObjectType: Conversation.
#
# A `Conversation` is one operator dialog session, owned by Bragi. Turns
# accumulate immutably; the session is partitioned by user_id for RBAC.
# See docs/roadmap/agents/agent-pantheon.md § 6.5 for the retention and per-user
# context rules.
schema_version: "1.0.0"
name: Conversation
version: "1.0.0"
key: id
description: One operator dialog session; owned by Bragi; partitioned by user_id.
properties:
  id:
    type: string
    required: true
    description: Opaque session identifier assigned by Bragi on first turn (session_id in payload).
  user_id:
    type: string
    required: true
    access_scope: owner
    purpose_binding: [user_context]
    description: RBAC-scoped user identifier; cross-user reads refused.
  started_at:
    type: string
    required: true
    description: ISO 8601 timestamp of session start.
  last_active:
    type: string
    required: true
    description: ISO 8601 timestamp of most recent turn.
  turn_count:
    type: integer
    required: false
    description: Monotonic count of turns in the session.
  correlation_id:
    type: string
    required: false
    access_scope: owner
    purpose_binding: [user_context]
    description: Root correlation id linking this session to trace records.
