# Upstream built-in ObjectType: Turn.
#
# A `Turn` is one exchange within a Conversation. Append-only. Includes
# the routing decision (primary agent, contributors, score) so the audit
# reader can reconstruct how a natural-language response was assembled.
# See docs/roadmap/agents/agent-pantheon.md § 6.3.
schema_version: "1.0.0"
name: Turn
version: "1.1.0"
key: id
description: One exchange in a Conversation; append-only; carries routing decision.
properties:
  id:
    type: string
    required: true
    description: Opaque turn identifier (turn_id in payload); stable within the parent Conversation.
  session_id:
    type: string
    required: true
    access_scope: owner
    purpose_binding: [user_context]
    description: Parent Conversation session id.
  turn_index:
    type: integer
    required: true
    description: Zero-based position within the Conversation.
  question_ref:
    type: string
    required: true
    access_scope: owner
    purpose_binding: [user_context]
    description: Opaque reference to the operator input in the principal-scoped conversation store.
  question_sha256:
    type: string
    required: true
    description: SHA-256 integrity digest of the operator input; never the input body.
  primary_agent:
    type: string
    required: true
    description: Name of the Agent that led the response (winner of Bragi routing).
  contributors:
    type: array
    required: false
    description: Names of Agents that provided typed-query inputs to primary_agent.
  answer_ref:
    type: string
    required: false
    access_scope: owner
    purpose_binding: [user_context]
    description: Opaque reference to the assistant output in the principal-scoped conversation store.
  answer_sha256:
    type: string
    required: false
    description: SHA-256 integrity digest of the assistant output; never the output body.
  score_breakdown:
    type: object
    required: false
    access_scope: owner
    purpose_binding: [user_context]
    description: Bragi routing scores (specificity, ownership, recency, confidence, tie_break) - see agent-pantheon.md § 6.3.
  trace_ref:
    type: string
    required: false
    description: Correlation id chain linking this turn to any typed-port events it triggered.
