schema_version: "1.0.0"
name: ConversationPolicy
version: "1.0.0"
key: id
description: Confirmed typed per-user conversation behavior; never raw system-prompt prose.
properties:
  id: {type: string, required: true}
  principal_ref: {type: string, required: true, access_scope: owner, purpose_binding: [user_context]}
  kind: {type: string, required: true}
  enabled: {type: boolean, required: true}
  revision: {type: integer, required: true}
  confirmed_at: {type: datetime, required: true}
  source_turn_id: {type: string, required: true, access_scope: owner, purpose_binding: [user_context]}
  policy_shape: {type: object, required: true, access_scope: owner, purpose_binding: [user_context]}
