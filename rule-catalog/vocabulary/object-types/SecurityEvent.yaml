# Upstream built-in ObjectType: SecurityEvent.
#
# A `SecurityEvent` is emitted by Forseti when an action proposal fails
# RBAC gating (or other security checks). Heimdall correlates and
# classifies severity; §9 of agent-pantheon.md defines the four-tier
# response ladder.
schema_version: "1.0.0"
name: SecurityEvent
version: "1.0.0"
key: id
description: First-class security signal (e.g., privilege_escalation_attempt); Forseti writes, Heimdall correlates.
properties:
  id:
    type: string
    required: true
    description: Opaque event id (event_id in payload); correlation follows correlation_id.
  correlation_id:
    type: string
    required: true
    description: Root correlation for the triggering action-proposal chain.
  event_type:
    type: string
    required: true
    description: Category (privilege_escalation_attempt, unusual_actor, etc.). Enum grows with pantheon.
  initiator_principal:
    type: string
    required: true
    description: The user or agent whose action was denied.
  attempted_action:
    type: string
    required: true
    description: ActionType name that was denied.
  target_resource:
    type: string
    required: false
    description: Resource id targeted (customer identifier - stays in fork audit only, never in issue labels).
  severity_hint:
    type: string
    required: false
    description: Forseti's initial hint (low | medium | high | critical); Heimdall may reclassify.
  detected_at:
    type: string
    required: true
    description: ISO 8601 timestamp of detection.
  evidence:
    type: object
    required: false
    description: Structured context (recent attempts, prior denials, actor pattern) - used by Heimdall correlator.
