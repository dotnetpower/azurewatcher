schema_version: 1.0.0
name: remediate.apply-preflight-toggle
version: 1.0.0
operation: update
interfaces:
- ControlPlane
- IdempotentByKey
- RequiresInventoryFresh
rollback_contract: pr_revert
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 21
  min_samples: 40
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: no_conflicting_open_action_on_resource
stop_conditions:
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Reassemble a terraform plan around a Deployment Preflight policy blocker by applying
  a registered capability-mode toggle (e.g. disk_provisioning=attach_existing, registry_source=acr_mirror),
  rendered as a tfvars-override remediation PR. Only fires when every blocking finding has an
  autofix toggle and the reassembled plan re-passes preflight (verifier is authority); a manual
  blocker routes the whole pass to hil. Reversible - reverting the override PR restores the prior
  plan. See docs/roadmap/preflight-active-reassembly.md.
category: remediation
trigger_kind:
  kind: both
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: approver
argument_schema:
  type: object
  additionalProperties: false
  required:
  - scope
  - finding_id
  - toggle_module
  - reason
  properties:
    scope:
      type: string
      x-fdai-audit-safe: true
      minLength: 1
    finding_id:
      type: string
      x-fdai-audit-safe: true
      minLength: 1
    toggle_module:
      type: string
      x-fdai-audit-safe: true
      minLength: 1
    set_vars:
      type: object
      additionalProperties:
        type: string
    reason:
      type: string
      x-fdai-audit-safe: true
      minLength: 10
      maxLength: 200
prod_downgrade:
  mode: enforce_hil
  detection_ref: risk-classification/env-detector
