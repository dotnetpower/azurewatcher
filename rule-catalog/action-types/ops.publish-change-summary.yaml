schema_version: 1.0.0
name: ops.publish-change-summary
version: 1.0.0
operation: create
interfaces:
- ControlPlane
- IdempotentByKey
rollback_contract: pr_revert
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions:
- kind: no_conflicting_open_action_on_resource
stop_conditions:
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource_group
description: Render a rendered Markdown change summary for a resource-group over a
  bounded time window and hand it to the delivery adapter. Rolls back by reverting the
  paired remediation PR (delivery-adapter agnostic - forks that publish to a Confluence
  page or a ticketing system implement the same rollback contract in their adapter).
category: ops
trigger_kind:
  kind: both
execution_path: pr_native
ceiling_by_tier:
  t0:
    max_autonomy: enforce_auto
    min_role: reader
  t1:
    max_autonomy: enforce_auto
    min_role: reader
  t2:
    max_autonomy: shadow_only
    min_role: contributor
argument_schema:
  type: object
  additionalProperties: false
  required:
  - target_resource_ref
  - window_hours
  properties:
    target_resource_ref:
      type: string
      minLength: 1
      description: CSP-neutral resource ref (typically a resource-group ref) whose subtree the summary covers.
    window_hours:
      type: integer
      minimum: 1
      maximum: 168
      default: 24
      description: Window length in hours; the summary aggregates changes observed within the last window_hours before generation.
    format:
      type: string
      enum:
      - markdown
      default: markdown
      description: Rendered output format. Only markdown ships upstream; forks add HTML / Confluence storage format via a custom template.
prod_downgrade:
  mode: enforce_hil
  detection_ref: risk-classification/env-detector
