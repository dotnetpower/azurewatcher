schema_version: "1.0.0"
name: tool.run-python-on-vm
version: "1.0.0"
operation: create
interfaces:
- ControlPlane
- DataPlaneMutating
- IdempotentByKey
- RequiresInventoryFresh
- RequiresMaintenanceWindow
rollback_contract: state_forward_only
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.99
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: no_conflicting_open_action_on_resource
- kind: resource_property_equals
  property: os_type
  value: linux
- kind: resource_property_equals
  property: vm_agent_ready
  value: true
- kind: maintenance_window_active
stop_conditions:
- kind: time_box_exceeded_seconds
  seconds: 86400
- kind: provider_api_error_streak
  count: 3
blast_radius:
  computation: static_enum
  static_bucket: resource
description: >-
  Stage a validated content-addressed Python artifact on one managed Linux VM
  and execute it through the registered VmTaskRunner. The target environment
  supplies Python, GPU drivers, and approved modules; the action never installs
  packages or accepts an arbitrary shell command.
category: tool
trigger_kind:
  kind: both
execution_path: tool_call
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: owner
  t1:
    max_autonomy: shadow_only
    min_role: owner
  t2:
    max_autonomy: shadow_only
    min_role: owner
env_scope: any
prod_downgrade:
  mode: shadow_only
  detection_ref: environment-classifier/v1
argument_schema:
  type: object
  additionalProperties: false
  required:
  - artifact_ref
  - target_resource_ref
  - reason
  properties:
    artifact_ref:
      type: string
      pattern: ^python-task:[a-z][a-z0-9_.-]{0,79}@[A-Za-z0-9_.-]{1,64}#[0-9a-f]{64}$
    target_resource_ref:
      type: string
      x-fdai-audit-safe: true
      minLength: 1
      maxLength: 2048
    reason:
      type: string
      x-fdai-audit-safe: true
      minLength: 10
      maxLength: 200
