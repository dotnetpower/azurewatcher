schema_version: 1.0.0
name: tool.run-chaos-experiment
version: 1.0.0
operation: create
interfaces:
- IdempotentByKey
rollback_contract: scripted
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions: []
stop_conditions:
- kind: time_box_exceeded_seconds
  seconds: 600
blast_radius:
  computation: static_enum
  static_bucket: resource_group
description: >-
  Run a catalog-backed chaos experiment through the governed fault-injection
  harness. Shadow records the plan without touching an injector. Enforce is
  available only after the scenario is promoted and a live injector and probe
  are both registered.
category: tool
trigger_kind:
  kind: both
execution_path: tool_call
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: owner
argument_schema:
  type: object
  additionalProperties: false
  required:
  - scenario_id
  - targets
  properties:
    scenario_id:
      type: string
      x-fdai-audit-safe: true
      minLength: 1
    targets:
      type: array
      minItems: 1
      maxItems: 10
      items:
        type: string
        x-fdai-audit-safe: true
        minLength: 1
