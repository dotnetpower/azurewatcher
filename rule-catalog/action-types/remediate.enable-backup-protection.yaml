schema_version: "1.0.0"
name: remediate.enable-backup-protection
version: "1.0.0"
operation: enable
interfaces:
  - ControlPlane
  - IdempotentByKey
  - RequiresInventoryFresh
rollback_contract: state_forward_only
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 21
  min_samples: 50
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions:
  - kind: graph_fresh_within_seconds
    value: 600
  - kind: no_conflicting_open_action_on_resource
stop_conditions:
  - kind: provider_api_error_streak
    count: 3
  - kind: time_box_exceeded_seconds
    seconds: 900
blast_radius:
  computation: static_enum
  static_bucket: resource
description: >-
  Enable backup / point-in-time / soft-delete / versioning
  protections on data-plane resources (blob soft-delete, blob
  versioning, PITR on PostgreSQL, geo-redundant backup on SQL,
  snapshot policy on disks). Turning protection off later is a
  separate governance-gated ActionType — this one is forward-only.
