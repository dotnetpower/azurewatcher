schema_version: 1.0.0
name: ops.deallocate-vm
version: 1.0.0
operation: disable
interfaces:
- ControlPlane
- IdempotentByKey
rollback_contract: state_forward_only
irreversible: false
default_mode: shadow
promotion_gate:
  min_shadow_days: 14
  min_samples: 30
  min_accuracy: 0.98
  max_policy_escapes: 0
preconditions:
- kind: graph_fresh_within_seconds
  value: 300
- kind: no_conflicting_open_action_on_resource
stop_conditions:
- kind: provider_api_error_streak
  count: 3
- kind: time_box_exceeded_seconds
  seconds: 300
blast_radius:
  computation: static_enum
  static_bucket: resource
description: Deallocate one Azure virtual machine through the development operations gateway. The
  action remains shadow-first and uses a separate start request for state-forward recovery.
category: ops
trigger_kind:
  kind: both
execution_path: direct_api
ceiling_by_tier:
  t0:
    max_autonomy: enforce_hil
    min_role: approver
  t1:
    max_autonomy: shadow_only
    min_role: approver
  t2:
    max_autonomy: shadow_only
    min_role: owner
argument_schema:
  type: object
  additionalProperties: false
  required:
  - resource_group
  - vm_name
  - reason
  properties:
    resource_group:
      type: string
      minLength: 1
      maxLength: 128
      x-fdai-audit-safe: true
    vm_name:
      type: string
      minLength: 1
      maxLength: 128
      x-fdai-audit-safe: true
    reason:
      type: string
      minLength: 10
      maxLength: 200
      x-fdai-audit-safe: true
prod_downgrade:
  mode: enforce_hil
  detection_ref: risk-classification/env-detector
