[alembic]
# Migration files live under ./alembic/versions/.
script_location = alembic

# Naming convention: YYYYMMDD_XXXX_slug.py — sortable, human-legible.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# The URL is read from AIOPSPILOT_DATABASE_URL in env.py.
sqlalchemy.url = driver://user:pass@host/dbname

# Track migration history in `alembic_version` (default).
version_locations = alembic/versions

# Timezone-aware timestamps in generated revision filenames.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
